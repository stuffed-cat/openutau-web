<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenUtau Web</title>
    <script>
        // 【核心防御】：从根源劫持 fetch / XMLHttpRequest，彻底屏蔽 OpenUtau 在启动时检查 GitHub Releases。
        // 这无需去修改 submodule（第三方 C# 代码），而是让发出 HTTP 请求的底层环境直接模拟返回，彻底杜绝 403 / 阻塞。
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            const url = args[0] instanceof Request ? args[0].url : args[0];
            if (typeof url === 'string' && url.includes('api.github.com/repos/stakira/OpenUtau/releases')) {
                console.log('[WebUI-Hijack] GitHub releases check completely blocked via fetch mock.');
                return new Response("[]", { status: 200, headers: { 'Content-Type': 'application/json' } });
            }
            return originalFetch.apply(this, args);
        };

        const originalXhrOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url, ...rest) {
            if (typeof url === 'string' && url.includes('api.github.com/repos/stakira/OpenUtau/releases')) {
                this._blockUpdate = true;
            }
            return originalXhrOpen.call(this, method, url, ...rest);
        };
        const originalXhrSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.send = function(...args) {
            if (this._blockUpdate) {
                console.log('[WebUI-Hijack] GitHub releases check completely blocked via XHR mock.');
                Object.defineProperty(this, 'readyState', { value: 4, writable: false });
                Object.defineProperty(this, 'status', { value: 200, writable: false });
                Object.defineProperty(this, 'responseText', { value: "[]", writable: false });
                if (this.onreadystatechange) this.onreadystatechange();
                if (this.onload) this.onload();
                return;
            }
            return originalXhrSend.call(this, ...args);
        };
    </script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #222; }
        #out { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="out"></div>
    <script type="module" src="./main.js"></script>
</body>
</html>
